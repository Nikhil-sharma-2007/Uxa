    /* ===== Reset some default styles ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== Basic Theme ===== */
    body {
      font-family: Arial, sans-serif;
      background: #f8faff;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #1565c0;
      color: #fff;
      padding: 22px 0 14px 0;
    }
    .container {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
    }
    /* ===== Navigation Menu ===== */
    nav {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    nav a:hover {
      background: #0d47a1;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    /* ===== Section Styles ===== */
    section {
      margin: 25px 0;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(21,101,192,0.07);
    }

    /* ===== Banner Image ===== */
    .banner {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 15px;
      margin: 17px 0;
      box-shadow: 0 1px 8px rgba(21,101,192,0.09);
    }

    /* ===== Courses List ===== */
    .courses-list {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 10px;
    }
    .course-card {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 7px;
      padding: 16px;
      flex: 1 1 240px;
      min-width: 200px;
      transition: box-shadow 0.2s;
    }
    .course-card:hover {
      box-shadow: 0 2px 6px #64b5f6;
    }

      margin-top: 10px;

      font-weight: 500;
    }
